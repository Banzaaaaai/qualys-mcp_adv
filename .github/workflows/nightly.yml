name: Nightly — Full Eval & Baseline Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

env:
  QUALYS_USERNAME: ${{ secrets.QUALYS_USERNAME }}
  QUALYS_PASSWORD: ${{ secrets.QUALYS_PASSWORD }}
  QUALYS_BASE_URL: ${{ secrets.QUALYS_BASE_URL }}
  QUALYS_GATEWAY_URL: ${{ secrets.QUALYS_GATEWAY_URL }}

jobs:
  full-eval:
    name: Full Eval Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.QUALYS_USERNAME }}"
          echo "::add-mask::${{ secrets.QUALYS_PASSWORD }}"
          echo "::add-mask::${{ secrets.QUALYS_BASE_URL }}"
          echo "::add-mask::${{ secrets.QUALYS_GATEWAY_URL }}"

      - name: Check credentials
        id: creds
        run: |
          if [ -z "$QUALYS_USERNAME" ]; then
            echo "⚠️ Qualys secrets not configured — skipping live eval"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.creds.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.creds.outputs.skip != 'true'
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Run full eval
        if: steps.creds.outputs.skip != 'true'
        run: |
          if [ -f eval.py ]; then
            python eval.py --limit 500 --json eval_results.json
          else
            echo "eval.py not found, skipping"
          fi

      - name: Run full benchmark
        if: steps.creds.outputs.skip != 'true'
        run: python benchmark.py --json benchmark_results.json

      - name: Run conversation tests
        if: steps.creds.outputs.skip != 'true'
        run: python tests/run_conversations.py --verbose

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-${{ github.run_number }}
          path: |
            benchmark_results.json
            eval_results.json
          retention-days: 90

      - name: Post summary
        if: always()
        run: |
          echo "## Nightly Eval Results — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f benchmark_results.json ]; then
            echo "### Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            python -c "
          import json
          d = json.load(open('benchmark_results.json'))
          for r in d['results']:
              print(f\"{r['tool']:40s}  cold={r['cold_s']:.2f}s  warm={r['warm_s']:.2f}s\")
          " >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f eval_results.json ]; then
            echo "### Eval" >> "$GITHUB_STEP_SUMMARY"
            score=$(python -c "import json; d=json.load(open('eval_results.json')); print(d.get('score', d.get('accuracy', 'N/A')))")
            echo "Score: **${score}%**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Eval" >> "$GITHUB_STEP_SUMMARY"
            echo "_eval.py not available — skipped_" >> "$GITHUB_STEP_SUMMARY"
          fi

  update-baseline:
    name: Update Benchmark Baseline
    runs-on: ubuntu-latest
    needs: full-eval
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Run benchmark and update baseline
        run: python benchmark.py --quick --json benchmark_baseline.json

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add benchmark_baseline.json
          if git diff --cached --quiet; then
            echo "No changes to baseline"
          else
            git commit -m "chore: update benchmark baseline [skip ci]"
            git push
          fi
