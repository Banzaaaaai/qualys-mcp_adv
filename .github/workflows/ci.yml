name: CI — Benchmark & Eval

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  QUALYS_USERNAME: ${{ secrets.QUALYS_USERNAME }}
  QUALYS_PASSWORD: ${{ secrets.QUALYS_PASSWORD }}
  QUALYS_BASE_URL: ${{ secrets.QUALYS_BASE_URL }}
  QUALYS_GATEWAY_URL: ${{ secrets.QUALYS_GATEWAY_URL }}
  EVAL_PASS_THRESHOLD: ${{ vars.EVAL_PASS_THRESHOLD || '80' }}

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Syntax check
        run: python -m py_compile qualys_mcp.py && echo "✅ Syntax OK"

      - name: Import check
        run: python -c "import qualys_mcp; print('✅ Import OK')"
        env:
          QUALYS_USERNAME: dummy
          QUALYS_PASSWORD: dummy
          QUALYS_BASE_URL: https://qualysapi.qualys.com
          QUALYS_GATEWAY_URL: https://gateway.qg1.apps.qualys.com

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    if: |
      secrets.QUALYS_USERNAME != ''
    steps:
      - uses: actions/checkout@v4

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.QUALYS_USERNAME }}"
          echo "::add-mask::${{ secrets.QUALYS_PASSWORD }}"
          echo "::add-mask::${{ secrets.QUALYS_BASE_URL }}"
          echo "::add-mask::${{ secrets.QUALYS_GATEWAY_URL }}"

      - name: Check credentials
        id: creds
        run: |
          if [ -z "$QUALYS_USERNAME" ]; then
            echo "⚠️ Qualys secrets not configured — skipping live API tests"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.creds.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.creds.outputs.skip != 'true'
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Run smoke tests
        if: steps.creds.outputs.skip != 'true'
        run: bash test_tools.sh fast

  conversation-tests:
    name: Conversation Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e .
      - name: Check credentials
        id: creds
        run: |
          if [ -z "$QUALYS_USERNAME" ]; then
            echo "⚠️ No credentials — skipping conversation tests"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run conversation tests
        if: steps.creds.outputs.skip != 'true'
        run: python tests/run_conversations.py --verbose

  benchmark:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Check credentials
        id: creds
        run: |
          if [ -z "$QUALYS_USERNAME" ]; then
            echo "⚠️ No credentials — skipping live benchmark"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run quick benchmark
        if: steps.creds.outputs.skip != 'true'
        run: python benchmark.py --quick --json benchmark_results.json

      - name: Compare against baseline
        if: steps.creds.outputs.skip != 'true'
        run: python scripts/compare_benchmark.py benchmark_baseline.json benchmark_results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json

  eval:
    name: Eval Harness
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . 2>/dev/null || pip install mcp httpx

      - name: Run eval (if available)
        id: eval
        run: |
          if [ -f eval.py ]; then
            python eval.py --quick --limit 50 --json eval_results.json
            echo "eval_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "eval.py not found, skipping"
            echo "eval_ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check eval threshold
        if: steps.eval.outputs.eval_ran == 'true'
        run: |
          score=$(python -c "import json; d=json.load(open('eval_results.json')); print(d.get('score', d.get('accuracy', 0)))")
          echo "Eval score: ${score}%"
          if (( $(echo "$score < $EVAL_PASS_THRESHOLD" | bc -l) )); then
            echo "::error::Eval score ${score}% is below threshold ${EVAL_PASS_THRESHOLD}%"
            exit 1
          fi

      - name: Upload eval results
        if: always() && steps.eval.outputs.eval_ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json

  post-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [smoke-test, conversation-tests, benchmark, eval]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .
        continue-on-error: true
      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: eval-results
          path: .
        continue-on-error: true
      - name: Post results comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          CONVERSATION_RESULT: ${{ needs.conversation-tests.result }}
          BENCHMARK_RESULT: ${{ needs.benchmark.result }}
          EVAL_RESULT: ${{ needs.eval.result }}
        run: python scripts/post_pr_comment.py
