name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Import & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Syntax check
        run: python -m py_compile qualys_mcp.py && echo "Syntax OK"

      - name: Import check
        run: python -c "import qualys_mcp; print('Import OK')"
        env:
          QUALYS_USERNAME: dummy
          QUALYS_PASSWORD: dummy
          QUALYS_BASE_URL: https://qualysapi.qualys.com
          QUALYS_GATEWAY_URL: https://gateway.qg1.apps.qualys.com

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/conversations -q
        env:
          QUALYS_USERNAME: dummy
          QUALYS_PASSWORD: dummy
          QUALYS_BASE_URL: https://qualysapi.qualys.com
          QUALYS_GATEWAY_URL: https://gateway.qg1.apps.qualys.com
